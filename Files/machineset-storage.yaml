apiVersion: machine.openshift.io/v1beta1
kind: MachineSet
metadata:
  creationTimestamp: null
  labels:
    machine.openshift.io/cluster-api-cluster: '$INFRASTRUCTURE_ID' 
  name: '$INFRASTRUCTURE_ID-$ROLE' 
  namespace: openshift-machine-api
spec:
  replicas: 3
  selector:
    matchLabels:
      machine.openshift.io/cluster-api-cluster: '$INFRASTRUCTURE_ID' 
      machine.openshift.io/cluster-api-machineset: '$INFRASTRUCTURE_ID-$ROLE' 
  template:
    metadata:
      creationTimestamp: null
      labels:
        machine.openshift.io/cluster-api-cluster: '$INFRASTRUCTURE_ID' 
        machine.openshift.io/cluster-api-machine-role: '$ROLE' 
        machine.openshift.io/cluster-api-machine-type: '$ROLE' 
        machine.openshift.io/cluster-api-machineset: '$INFRASTRUCTURE_ID-$ROLE' 
    spec:
      metadata:
        creationTimestamp: null
        labels:
          node-role.kubernetes.io/infra: "" 
      providerSpec:
        value:
          apiVersion: vsphereprovider.openshift.io/v1beta1
          credentialsSecret:
            name: vsphere-cloud-credentials
          diskGiB: 120
          kind: VSphereMachineProviderSpec
          memoryMiB: 24576 
          metadata:
            creationTimestamp: null
          network:
            devices:
            - networkName: DPortGroup-Guests
          numCPUs: 4
          numCoresPerSocket: 1
          snapshot: ""
          template: '$INFRASTRUCTURE_ID-rhcos'
          userDataSecret:
            name: worker-user-data
          workspace:
            datacenter: PisgahForest
            datastore: datastore-shared-iscsi
            folder: '/PisgahForest/vm/$INFRASTRUCTURE_ID'
            resourcepool: '/PisgahForest/host/OCP4/Resources'
            server: vmw-vcenter6.matrix.lab
